# MILO production bootstrap v2 — plan / apply / audit.
#
# Trust model:
# - Runnable only via workflow_dispatch from the protected trusted ref
#   (refs/heads/main). The `guard` job verifies the ref and validates every
#   input BEFORE any job that can authenticate to a provider runs. This
#   workflow is therefore inert on PR branches; merging this file does not
#   enable production apply until the change reaches the trusted ref and
#   the required GitHub Environment / secrets / variables are configured.
# - `plan` holds no write-capable production credential: it authenticates
#   with a dedicated read-only service account variable.
# - `apply` requires GitHub Environment approval (environment: production)
#   and an operator-approved plan digest input.
# - `audit` uses its own concurrency group and can never cancel an apply.
# - All third-party actions are pinned to immutable full commit SHAs.
name: bootstrap-production-v2

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        options: [plan, apply, audit]
        required: true
      bootstrap_sha:
        description: "Full 40-hex commit SHA being bootstrapped (must equal the run's head SHA)"
        type: string
        required: true
      approved_plan_digest:
        description: "MILO_PLAN_DIGEST approved by the operator (64 hex; required for apply)"
        type: string
        required: false
        default: ""
      confirm:
        description: "Type I_UNDERSTAND_THIS_CHANGES_PRODUCTION for apply"
        type: string
        required: false
        default: ""

permissions: {}

env:
  TRUSTED_REF: refs/heads/main

jobs:
  guard:
    name: validate inputs and trusted ref (no credentials)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: refuse untrusted refs before anything else
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "${TRUSTED_REF}" ]; then
            echo "BLOCKED: bootstrap v2 may only run from ${TRUSTED_REF}, got ${GITHUB_REF}" >&2
            exit 1
          fi
      - name: strictly validate all inputs
        env:
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_SHA: ${{ inputs.bootstrap_sha }}
          INPUT_DIGEST: ${{ inputs.approved_plan_digest }}
          INPUT_CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          case "${INPUT_MODE}" in plan|apply|audit) ;; *)
            echo "BLOCKED: invalid mode" >&2; exit 1;;
          esac
          if ! printf '%s' "${INPUT_SHA}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "BLOCKED: bootstrap_sha must be a full lowercase 40-hex sha" >&2
            exit 1
          fi
          if [ "${INPUT_SHA}" != "${GITHUB_SHA}" ]; then
            echo "BLOCKED: bootstrap_sha does not equal the run head sha" >&2
            exit 1
          fi
          if [ "${INPUT_MODE}" = "apply" ]; then
            if ! printf '%s' "${INPUT_DIGEST}" | grep -Eq '^[0-9a-f]{64}$'; then
              echo "BLOCKED: apply requires a full 64-hex approved_plan_digest" >&2
              exit 1
            fi
            if [ "${INPUT_CONFIRM}" != "I_UNDERSTAND_THIS_CHANGES_PRODUCTION" ]; then
              echo "BLOCKED: apply requires the exact confirmation string" >&2
              exit 1
            fi
          fi

  plan:
    name: read-only global discovery and frozen plan
    needs: guard
    if: ${{ inputs.mode == 'plan' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: bootstrap-v2-plan
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # WIF auth to GCP with the READ-ONLY service account
    steps:
      - name: checkout trusted ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: setup python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: authenticate to gcp (read-only identity)
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE }}
          service_account: ${{ vars.GITHUB_BOOTSTRAP_READONLY_SA }}
      - name: run plan
        env:
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          IN_SHA: ${{ inputs.bootstrap_sha }}
          IN_DIGEST: ${{ inputs.approved_plan_digest }}
          V_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          V_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          V_VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          V_SUPABASE_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          V_ORIGIN: ${{ vars.PRODUCTION_ORIGIN }}
        run: |
          set -euo pipefail
          ./scripts/release/bootstrap-production-v2.sh \
            --mode plan \
            --bootstrap-sha "${IN_SHA}" \
            --trusted-ref main \
            --gcp-project-number "${V_PROJECT_NUMBER}" \
            --vercel-project-id "${V_VERCEL_PROJECT_ID}" \
            --vercel-org-id "${V_VERCEL_ORG_ID}" \
            --supabase-project-ref "${V_SUPABASE_REF}" \
            --production-origin "${V_ORIGIN}" \
            --output-dir "${RUNNER_TEMP}/bootstrap-v2-plan"
      - name: upload plan report (non-secret)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bootstrap-v2-plan
          path: ${{ runner.temp }}/bootstrap-v2-plan/
          if-no-files-found: error
          retention-days: 14

  apply:
    name: transactional apply (environment-gated)
    needs: guard
    if: ${{ inputs.mode == 'apply' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    concurrency:
      group: bootstrap-v2-apply
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # WIF auth to GCP with the bootstrap operator identity
    steps:
      - name: checkout trusted ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: setup python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: authenticate to gcp (bootstrap operator identity)
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE }}
          service_account: ${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}
      - name: run apply
        env:
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          IN_SHA: ${{ inputs.bootstrap_sha }}
          IN_DIGEST: ${{ inputs.approved_plan_digest }}
          V_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          V_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          V_VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          V_SUPABASE_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          V_ORIGIN: ${{ vars.PRODUCTION_ORIGIN }}
          MILO_OPERATOR_ACK: I_UNDERSTAND_THIS_CHANGES_PRODUCTION
        run: |
          set -euo pipefail
          ./scripts/release/bootstrap-production-v2.sh \
            --mode apply \
            --confirm-production-change \
            --bootstrap-sha "${IN_SHA}" \
            --approved-plan-digest "${IN_DIGEST}" \
            --trusted-ref main \
            --gcp-project-number "${V_PROJECT_NUMBER}" \
            --vercel-project-id "${V_VERCEL_PROJECT_ID}" \
            --vercel-org-id "${V_VERCEL_ORG_ID}" \
            --supabase-project-ref "${V_SUPABASE_REF}" \
            --production-origin "${V_ORIGIN}" \
            --output-dir "${RUNNER_TEMP}/bootstrap-v2-apply"
      - name: upload metadata artifact (only exists after a fully audited apply)
        if: ${{ success() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bootstrap-metadata-v3
          path: ${{ runner.temp }}/bootstrap-v2-apply/bootstrap-metadata-v3.env
          if-no-files-found: error
          retention-days: 30

  audit:
    name: read-only audit (never cancels apply)
    needs: guard
    if: ${{ inputs.mode == 'audit' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: bootstrap-v2-audit
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # WIF auth to GCP with the READ-ONLY service account
    steps:
      - name: checkout trusted ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: setup python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: authenticate to gcp (read-only identity)
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE }}
          service_account: ${{ vars.GITHUB_BOOTSTRAP_READONLY_SA }}
      - name: run audit
        env:
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          IN_SHA: ${{ inputs.bootstrap_sha }}
          IN_DIGEST: ${{ inputs.approved_plan_digest }}
          V_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          V_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          V_VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          V_SUPABASE_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          V_ORIGIN: ${{ vars.PRODUCTION_ORIGIN }}
        run: |
          set -euo pipefail
          ./scripts/release/bootstrap-production-v2.sh \
            --mode audit \
            --bootstrap-sha "${IN_SHA}" \
            --trusted-ref main \
            --gcp-project-number "${V_PROJECT_NUMBER}" \
            --vercel-project-id "${V_VERCEL_PROJECT_ID}" \
            --vercel-org-id "${V_VERCEL_ORG_ID}" \
            --supabase-project-ref "${V_SUPABASE_REF}" \
            --production-origin "${V_ORIGIN}" \
            --output-dir "${RUNNER_TEMP}/bootstrap-v2-audit"
      - name: upload audit report (non-secret)
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bootstrap-v2-audit
          path: ${{ runner.temp }}/bootstrap-v2-audit/
          if-no-files-found: error
          retention-days: 14
