name: Repo Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MILO-main-original/MILO-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -v test_safe_agent_pipeline.py test_safety_guards.py
