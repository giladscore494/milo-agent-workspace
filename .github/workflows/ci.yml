name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: offline-placeholder
      JOB_LAUNCHER: disabled
      NEXT_PUBLIC_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Backend offline tests
        run: pytest -q tests --ignore=MILO-main-original/MILO-main/test_websearch.py
      - name: Migration syntax smoke check
        run: python scripts/check_migrations.py
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Unsafe default / execution-flag scan
        run: python scripts/check_unsafe_defaults.py
      - name: ShellCheck release/operator scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x -S warning scripts/release/*.sh scripts/release/lib/common.sh
      - name: Release manifest schema validation
        run: python scripts/release/validate_production_manifest.py --manifest config/production.example.yaml --mode plan
      - name: Read-only production readiness audit (proves no external calls / no mutation in CI)
        run: bash scripts/release/production-readiness.sh
      - name: Docker build API
        run: docker build -f Dockerfile.api -t milo-agent-api:ci .
      - name: Docker build worker
        run: docker build -f Dockerfile.worker -t milo-agent-worker:ci .
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend production build
        working-directory: frontend
        run: npm run build
      - name: Frontend type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Frontend tests
        working-directory: frontend
        run: npm test -- --run
      - name: Frontend static UI check
        working-directory: frontend
        run: npm run test:static
      - name: Frontend secret bundle check
        working-directory: frontend
        run: npm run test:secrets

  postgres-checks:
    # Real ephemeral PostgreSQL validation of every migration and every
    # concurrency/security property. MILO_REQUIRE_PG_TESTS turns any
    # missing-binary skip into a hard failure, so this job can never pass
    # without actually executing the suite.
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: offline-placeholder
      JOB_LAUNCHER: disabled
      MILO_REQUIRE_PG_TESTS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PostgreSQL server binaries
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Executable migration + concurrency + RLS suite (skips forbidden)
        run: |
          pytest -rs tests/test_migrations_postgres.py | tee pg-test-output.txt
          if grep -qE "SKIPPED|skipped" pg-test-output.txt; then
            echo "PostgreSQL tests were skipped; failing the job."
            exit 1
          fi
      - name: Migration static check
        run: python scripts/check_migrations.py

  e2e:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: offline-placeholder
      JOB_LAUNCHER: disabled
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run isolated E2E suite (mocked auth, worker and model adapters)
        working-directory: frontend
        run: npx playwright test

