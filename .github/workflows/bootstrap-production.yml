name: Bootstrap Production

# Manually triggered ONLY. Never runs on push or pull_request. The plan job is
# always available and fully read-only. The apply job additionally requires an
# explicit typed confirmation input AND GitHub Environment `production`
# approval. The audit-only job is fully read-only and fail-closed: it can
# consume the durable non-secret metadata artifact preserved by a SUCCESSFUL
# apply run (metadata_run_id → metadata-assisted credentialed audit) or fall
# back to the credentialed deep audit; with neither evidence source the audit
# is BLOCKED. A failed or partial apply never uploads metadata.
#
# Two DISTINCT trust chains, kept clearly separate:
#   * GitHub Actions -> GCP  : authenticates THIS workflow (Workload Identity
#     Federation; no service-account keys). Vars: GITHUB_WIF_PROVIDER_RESOURCE,
#     GITHUB_BOOTSTRAP_OPERATOR_SA.
#   * Vercel -> GCP          : the production gateway's federation, verified by
#     the bootstrap. Vars: VERCEL_WIF_* (pool/provider/issuer/audience/
#     attribute-condition/principal-set).
#
# The bootstrap ADOPTS the operator's existing Secret Manager resources
# (SUPABASE_URL, SUPABASE_SECRET_KEY, KIMI_API_KEY, UPSTASH_REDIS_REST_TOKEN);
# those Supabase/provider values are never duplicated as GitHub secrets. Vercel
# identity uses the supported CI mechanism (VERCEL_TOKEN / VERCEL_ORG_ID /
# VERCEL_PROJECT_ID in the environment) — no committed .vercel/project.json,
# and the token is never on the command line.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Bootstrap mode"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - audit-only
      apply_confirmation:
        description: "For apply mode, type exactly: I_UNDERSTAND_THIS_CHANGES_PRODUCTION"
        required: false
        type: string
      metadata_run_id:
        description: >-
          For audit-only mode: the run id of the SUCCESSFUL apply whose
          preserved bootstrap-production-metadata artifact should drive the
          metadata-assisted audit. Dispatch the audit from the SAME release
          ref as that apply (the audit binds to the release SHA). Leave empty
          to run the credentialed deep audit (requires the Upstash secrets).
        required: false
        type: string

permissions:
  contents: read
  id-token: write   # required for GitHub -> GCP Workload Identity Federation

concurrency:
  group: bootstrap-production
  cancel-in-progress: false

# The Vercel CLI is pinned to the EXACT numeric version recorded in
# scripts/release/VERCEL_CLI_VERSION (single source of truth; never @latest).
# That version is verified IN CI against the REAL CLI before any bootstrap
# step: it must support `env ls/add`, in-place `env update --yes` and
# `env run --environment` (contract tests; help/version only, never a deploy).

jobs:
  plan:
    name: Plan (read-only)
    if: ${{ github.event.inputs.mode == 'plan' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned Vercel CLI (from scripts/release/VERCEL_CLI_VERSION)
        run: |
          set -euo pipefail
          VERCEL_CLI_VERSION="$(tr -d '[:space:]' < scripts/release/VERCEL_CLI_VERSION)"
          echo "VERCEL_CLI_VERSION=${VERCEL_CLI_VERSION}" >> "${GITHUB_ENV}"
          npm install -g "vercel@${VERCEL_CLI_VERSION}"
      - name: Contract preflight — real Vercel CLI + Upstash API (read-only; no deploy, no mutation)
        env:
          MILO_REQUIRE_VERCEL_CLI_CONTRACT: "1"
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
        run: |
          set -euo pipefail
          python -m pip install --quiet pytest
          if [[ -n "${UPSTASH_EMAIL:-}" && -n "${UPSTASH_API_KEY:-}" ]]; then
            export MILO_REQUIRE_UPSTASH_CONTRACT=1
          fi
          python -m pytest -q tests/test_contract_vercel_cli.py tests/test_contract_upstash_api.py

      - name: Authenticate to Google Cloud via Workload Identity Federation
        if: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE }}
          service_account: ${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}
      - name: Set up gcloud
        if: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE != '' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Run bootstrap plan (read-only)
        shell: bash
        env:
          # Only NON-Secret-Manager management creds. Vercel identity via env.
          MILO_UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          MILO_UPSTASH_APIKEY: ${{ secrets.UPSTASH_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_WIF_POOL_ID: ${{ vars.VERCEL_WIF_POOL_ID }}
          VERCEL_WIF_PROVIDER_ID: ${{ vars.VERCEL_WIF_PROVIDER_ID }}
          VERCEL_WIF_ISSUER: ${{ vars.VERCEL_WIF_ISSUER }}
          VERCEL_WIF_ALLOWED_AUDIENCE: ${{ vars.VERCEL_WIF_ALLOWED_AUDIENCE }}
          VERCEL_WIF_ATTRIBUTE_CONDITION: ${{ vars.VERCEL_WIF_ATTRIBUTE_CONDITION }}
          VERCEL_WIF_ATTRIBUTE_MAPPING: ${{ vars.VERCEL_WIF_ATTRIBUTE_MAPPING }}
          VERCEL_WIF_PRINCIPAL_SET: ${{ vars.VERCEL_WIF_PRINCIPAL_SET }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bootstrap-out"
          # VERCEL_TOKEN reaches the bootstrap by NAME only (never argv).
          wif_args=()
          [[ -n "${VERCEL_WIF_POOL_ID:-}" ]] && wif_args+=(--wif-pool "${VERCEL_WIF_POOL_ID}")
          [[ -n "${VERCEL_WIF_PROVIDER_ID:-}" ]] && wif_args+=(--wif-provider "${VERCEL_WIF_PROVIDER_ID}")
          [[ -n "${VERCEL_WIF_ISSUER:-}" ]] && wif_args+=(--wif-issuer "${VERCEL_WIF_ISSUER}")
          [[ -n "${VERCEL_WIF_ALLOWED_AUDIENCE:-}" ]] && wif_args+=(--wif-audience "${VERCEL_WIF_ALLOWED_AUDIENCE}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_CONDITION:-}" ]] && wif_args+=(--wif-attribute-condition "${VERCEL_WIF_ATTRIBUTE_CONDITION}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_MAPPING:-}" ]] && wif_args+=(--wif-attribute-mapping "${VERCEL_WIF_ATTRIBUTE_MAPPING}")
          [[ -n "${VERCEL_WIF_PRINCIPAL_SET:-}" ]] && wif_args+=(--wif-principal-set "${VERCEL_WIF_PRINCIPAL_SET}")
          bash scripts/release/bootstrap-production.sh --plan \
            --output-directory "${RUNNER_TEMP}/bootstrap-out" \
            --expected-account "${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}" \
            --vercel-token-env VERCEL_TOKEN \
            --upstash-email-env MILO_UPSTASH_EMAIL \
            --upstash-apikey-env MILO_UPSTASH_APIKEY \
            "${wif_args[@]}"

      - name: Upload redacted plan reports (never secret files)
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-plan-reports
          path: |
            ${{ runner.temp }}/bootstrap-out/bootstrap-plan.json
            ${{ runner.temp }}/bootstrap-out/readiness.json
            ${{ runner.temp }}/bootstrap-out/readiness.log
          if-no-files-found: warn

  apply:
    name: Apply (guarded)
    if: ${{ github.event.inputs.mode == 'apply' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate apply confirmation
        if: ${{ github.event.inputs.apply_confirmation != 'I_UNDERSTAND_THIS_CHANGES_PRODUCTION' }}
        run: |
          echo "Apply requires apply_confirmation == I_UNDERSTAND_THIS_CHANGES_PRODUCTION."
          echo "No production changes were made."
          exit 1

      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned Vercel CLI (from scripts/release/VERCEL_CLI_VERSION)
        run: |
          set -euo pipefail
          VERCEL_CLI_VERSION="$(tr -d '[:space:]' < scripts/release/VERCEL_CLI_VERSION)"
          echo "VERCEL_CLI_VERSION=${VERCEL_CLI_VERSION}" >> "${GITHUB_ENV}"
          npm install -g "vercel@${VERCEL_CLI_VERSION}"
      - name: Contract preflight — real Vercel CLI + Upstash API (read-only; no deploy, no mutation)
        env:
          MILO_REQUIRE_VERCEL_CLI_CONTRACT: "1"
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
        run: |
          set -euo pipefail
          python -m pip install --quiet pytest
          if [[ -n "${UPSTASH_EMAIL:-}" && -n "${UPSTASH_API_KEY:-}" ]]; then
            export MILO_REQUIRE_UPSTASH_CONTRACT=1
          fi
          python -m pytest -q tests/test_contract_vercel_cli.py tests/test_contract_upstash_api.py

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE }}
          service_account: ${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run guarded bootstrap apply
        shell: bash
        env:
          MILO_OPERATOR_ACK: I_UNDERSTAND_THIS_CHANGES_PRODUCTION
          # No SUPABASE_SERVICE_ROLE_KEY / PROVIDER_API_KEY: adopted from GSM.
          MILO_UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          MILO_UPSTASH_APIKEY: ${{ secrets.UPSTASH_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_WIF_POOL_ID: ${{ vars.VERCEL_WIF_POOL_ID }}
          VERCEL_WIF_PROVIDER_ID: ${{ vars.VERCEL_WIF_PROVIDER_ID }}
          VERCEL_WIF_ISSUER: ${{ vars.VERCEL_WIF_ISSUER }}
          VERCEL_WIF_ALLOWED_AUDIENCE: ${{ vars.VERCEL_WIF_ALLOWED_AUDIENCE }}
          VERCEL_WIF_ATTRIBUTE_CONDITION: ${{ vars.VERCEL_WIF_ATTRIBUTE_CONDITION }}
          VERCEL_WIF_ATTRIBUTE_MAPPING: ${{ vars.VERCEL_WIF_ATTRIBUTE_MAPPING }}
          VERCEL_WIF_PRINCIPAL_SET: ${{ vars.VERCEL_WIF_PRINCIPAL_SET }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bootstrap-out"
          wif_args=()
          [[ -n "${VERCEL_WIF_POOL_ID:-}" ]] && wif_args+=(--wif-pool "${VERCEL_WIF_POOL_ID}")
          [[ -n "${VERCEL_WIF_PROVIDER_ID:-}" ]] && wif_args+=(--wif-provider "${VERCEL_WIF_PROVIDER_ID}")
          [[ -n "${VERCEL_WIF_ISSUER:-}" ]] && wif_args+=(--wif-issuer "${VERCEL_WIF_ISSUER}")
          [[ -n "${VERCEL_WIF_ALLOWED_AUDIENCE:-}" ]] && wif_args+=(--wif-audience "${VERCEL_WIF_ALLOWED_AUDIENCE}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_CONDITION:-}" ]] && wif_args+=(--wif-attribute-condition "${VERCEL_WIF_ATTRIBUTE_CONDITION}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_MAPPING:-}" ]] && wif_args+=(--wif-attribute-mapping "${VERCEL_WIF_ATTRIBUTE_MAPPING}")
          [[ -n "${VERCEL_WIF_PRINCIPAL_SET:-}" ]] && wif_args+=(--wif-principal-set "${VERCEL_WIF_PRINCIPAL_SET}")
          bash scripts/release/bootstrap-production.sh --apply \
            --environment production \
            --confirm-production-change \
            --release-sha "${GITHUB_SHA}" \
            --output-directory "${RUNNER_TEMP}/bootstrap-out" \
            --expected-account "${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}" \
            --vercel-token-env VERCEL_TOKEN \
            --upstash-email-env MILO_UPSTASH_EMAIL \
            --upstash-apikey-env MILO_UPSTASH_APIKEY \
            "${wif_args[@]}"

      - name: Upload redacted apply reports (never secret files)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-apply-reports
          path: |
            ${{ runner.temp }}/bootstrap-out/bootstrap-apply.json
            ${{ runner.temp }}/bootstrap-out/readiness.json
            ${{ runner.temp }}/bootstrap-out/readiness.log
          if-no-files-found: warn

      # Preserve the release-bound NON-SECRET audit metadata as a durable
      # artifact — ONLY when the apply step fully succeeded. The bootstrap
      # itself writes this file only after a fully successful apply + final
      # audit and deletes it on partial failure, so metadata from a failed or
      # partial apply can never be uploaded (this step is additionally gated
      # on success() and errors if the file is unexpectedly absent).
      - name: Preserve successful audit metadata (non-secret, release-bound)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-production-metadata
          path: ${{ runner.temp }}/bootstrap-out/milo-production.metadata.env
          if-no-files-found: error

  audit:
    name: Audit-only (read-only, fail-closed)
    if: ${{ github.event.inputs.mode == 'audit-only' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write   # GitHub -> GCP Workload Identity Federation
      actions: read     # cross-run download of the preserved metadata artifact
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned Vercel CLI (from scripts/release/VERCEL_CLI_VERSION)
        run: |
          set -euo pipefail
          VERCEL_CLI_VERSION="$(tr -d '[:space:]' < scripts/release/VERCEL_CLI_VERSION)"
          echo "VERCEL_CLI_VERSION=${VERCEL_CLI_VERSION}" >> "${GITHUB_ENV}"
          npm install -g "vercel@${VERCEL_CLI_VERSION}"
      - name: Contract preflight — real Vercel CLI (metadata audit; no Upstash secrets)
        if: ${{ github.event.inputs.metadata_run_id != '' }}
        env:
          MILO_REQUIRE_VERCEL_CLI_CONTRACT: "1"
        run: |
          set -euo pipefail
          python -m pip install --quiet pytest
          python -m pytest -q tests/test_contract_vercel_cli.py

      - name: Contract preflight — real Vercel CLI + Upstash API (deep audit GET-only)
        if: ${{ github.event.inputs.metadata_run_id == '' }}
        env:
          MILO_REQUIRE_VERCEL_CLI_CONTRACT: "1"
          MILO_REQUIRE_UPSTASH_CONTRACT: "1"
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
        run: |
          set -euo pipefail
          python -m pip install --quiet pytest
          test -n "${UPSTASH_EMAIL:-}" && test -n "${UPSTASH_API_KEY:-}"
          python -m pytest -q tests/test_contract_vercel_cli.py tests/test_contract_upstash_api.py

      # PROVENANCE GATE: a metadata artifact is never trusted merely because
      # it has the expected filename. Before the download, the named run must
      # be proven (via the Actions API, actions:read) to be a SUCCESSFUL,
      # workflow_dispatch-triggered run of THIS repository's
      # bootstrap-production workflow whose head SHA equals the commit being
      # audited. Only the apply job of this workflow ever uploads the
      # bootstrap-production-metadata artifact, and only on full success —
      # so these checks bind the artifact to a successful apply of this exact
      # release. The bootstrap then re-validates the file content and the
      # live state (fail closed) as an independent second layer.
      - name: Verify metadata artifact provenance (workflow, success, repository, SHA)
        if: ${{ github.event.inputs.metadata_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          METADATA_RUN_ID: ${{ github.event.inputs.metadata_run_id }}
        run: |
          set -euo pipefail
          [[ "${METADATA_RUN_ID}" =~ ^[0-9]+$ ]] || { echo "BLOCKED: metadata_run_id must be a numeric workflow run id"; exit 1; }
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${METADATA_RUN_ID}")"
          wf_path="$(jq -r '.path // ""' <<< "${run_json}")"
          conclusion="$(jq -r '.conclusion // ""' <<< "${run_json}")"
          run_repo="$(jq -r '.repository.full_name // ""' <<< "${run_json}")"
          head_repo="$(jq -r '.head_repository.full_name // ""' <<< "${run_json}")"
          head_sha="$(jq -r '.head_sha // ""' <<< "${run_json}")"
          run_event="$(jq -r '.event // ""' <<< "${run_json}")"
          [[ "${wf_path}" == ".github/workflows/bootstrap-production.yml" ]] || { echo "BLOCKED: run ${METADATA_RUN_ID} belongs to workflow '${wf_path}', not the bootstrap-production workflow"; exit 1; }
          [[ "${conclusion}" == "success" ]] || { echo "BLOCKED: run ${METADATA_RUN_ID} conclusion is '${conclusion}', not success (metadata from a failed or partial apply is never trusted)"; exit 1; }
          [[ "${run_repo}" == "${GITHUB_REPOSITORY}" ]] || { echo "BLOCKED: run ${METADATA_RUN_ID} belongs to repository '${run_repo}', not ${GITHUB_REPOSITORY}"; exit 1; }
          [[ "${head_repo}" == "${GITHUB_REPOSITORY}" ]] || { echo "BLOCKED: run ${METADATA_RUN_ID} head repository is '${head_repo}' (fork), not ${GITHUB_REPOSITORY}"; exit 1; }
          [[ "${run_event}" == "workflow_dispatch" ]] || { echo "BLOCKED: run ${METADATA_RUN_ID} event is '${run_event}', not workflow_dispatch (the guarded apply is dispatch-only)"; exit 1; }
          [[ "${head_sha}" == "${GITHUB_SHA}" ]] || { echo "BLOCKED: run ${METADATA_RUN_ID} head SHA ${head_sha} does not equal the audited ${GITHUB_SHA}; dispatch the audit from the SAME release ref as the apply"; exit 1; }
          echo "Provenance verified: successful bootstrap-production run ${METADATA_RUN_ID} of ${GITHUB_REPOSITORY}@${head_sha}"

      # Fetch the durable metadata preserved by the successful apply run
      # (metadata_run_id). Optional: without it, the credentialed deep audit
      # runs instead — and with NEITHER metadata nor Upstash secrets, the
      # bootstrap's audit contract is BLOCKED (fail closed, never degraded).
      - name: Download preserved audit metadata
        if: ${{ github.event.inputs.metadata_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-production-metadata
          run-id: ${{ github.event.inputs.metadata_run_id }}
          github-token: ${{ github.token }}
          path: ${{ runner.temp }}/bootstrap-metadata

      - name: Authenticate to Google Cloud via Workload Identity Federation
        if: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE }}
          service_account: ${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}
      - name: Set up gcloud
        if: ${{ vars.GITHUB_WIF_PROVIDER_RESOURCE != '' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Run fail-closed metadata audit (no Upstash credentials, no mutations)
        if: ${{ github.event.inputs.metadata_run_id != '' }}
        shell: bash
        env:
          METADATA_RUN_ID: ${{ github.event.inputs.metadata_run_id }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_WIF_POOL_ID: ${{ vars.VERCEL_WIF_POOL_ID }}
          VERCEL_WIF_PROVIDER_ID: ${{ vars.VERCEL_WIF_PROVIDER_ID }}
          VERCEL_WIF_ISSUER: ${{ vars.VERCEL_WIF_ISSUER }}
          VERCEL_WIF_ALLOWED_AUDIENCE: ${{ vars.VERCEL_WIF_ALLOWED_AUDIENCE }}
          VERCEL_WIF_ATTRIBUTE_CONDITION: ${{ vars.VERCEL_WIF_ATTRIBUTE_CONDITION }}
          VERCEL_WIF_ATTRIBUTE_MAPPING: ${{ vars.VERCEL_WIF_ATTRIBUTE_MAPPING }}
          VERCEL_WIF_PRINCIPAL_SET: ${{ vars.VERCEL_WIF_PRINCIPAL_SET }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bootstrap-out"
          metadata_args=()
          if [[ -n "${METADATA_RUN_ID:-}" ]]; then
            metadata_args+=(--audit-metadata "${RUNNER_TEMP}/bootstrap-metadata/milo-production.metadata.env")
          fi
          wif_args=()
          [[ -n "${VERCEL_WIF_POOL_ID:-}" ]] && wif_args+=(--wif-pool "${VERCEL_WIF_POOL_ID}")
          [[ -n "${VERCEL_WIF_PROVIDER_ID:-}" ]] && wif_args+=(--wif-provider "${VERCEL_WIF_PROVIDER_ID}")
          [[ -n "${VERCEL_WIF_ISSUER:-}" ]] && wif_args+=(--wif-issuer "${VERCEL_WIF_ISSUER}")
          [[ -n "${VERCEL_WIF_ALLOWED_AUDIENCE:-}" ]] && wif_args+=(--wif-audience "${VERCEL_WIF_ALLOWED_AUDIENCE}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_CONDITION:-}" ]] && wif_args+=(--wif-attribute-condition "${VERCEL_WIF_ATTRIBUTE_CONDITION}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_MAPPING:-}" ]] && wif_args+=(--wif-attribute-mapping "${VERCEL_WIF_ATTRIBUTE_MAPPING}")
          [[ -n "${VERCEL_WIF_PRINCIPAL_SET:-}" ]] && wif_args+=(--wif-principal-set "${VERCEL_WIF_PRINCIPAL_SET}")
          bash scripts/release/bootstrap-production.sh --audit-only \
            --release-sha "${GITHUB_SHA}" \
            --output-directory "${RUNNER_TEMP}/bootstrap-out" \
            --expected-account "${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}" \
            --vercel-token-env VERCEL_TOKEN \
            "${metadata_args[@]+"${metadata_args[@]}"}" \
            "${wif_args[@]+"${wif_args[@]}"}"

      - name: Run fail-closed deep audit (Upstash GET-only, no mutations)
        if: ${{ github.event.inputs.metadata_run_id == '' }}
        shell: bash
        env:
          MILO_UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          MILO_UPSTASH_APIKEY: ${{ secrets.UPSTASH_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_WIF_POOL_ID: ${{ vars.VERCEL_WIF_POOL_ID }}
          VERCEL_WIF_PROVIDER_ID: ${{ vars.VERCEL_WIF_PROVIDER_ID }}
          VERCEL_WIF_ISSUER: ${{ vars.VERCEL_WIF_ISSUER }}
          VERCEL_WIF_ALLOWED_AUDIENCE: ${{ vars.VERCEL_WIF_ALLOWED_AUDIENCE }}
          VERCEL_WIF_ATTRIBUTE_CONDITION: ${{ vars.VERCEL_WIF_ATTRIBUTE_CONDITION }}
          VERCEL_WIF_ATTRIBUTE_MAPPING: ${{ vars.VERCEL_WIF_ATTRIBUTE_MAPPING }}
          VERCEL_WIF_PRINCIPAL_SET: ${{ vars.VERCEL_WIF_PRINCIPAL_SET }}
        run: |
          set -euo pipefail
          test -n "${MILO_UPSTASH_EMAIL:-}" && test -n "${MILO_UPSTASH_APIKEY:-}"
          mkdir -p "${RUNNER_TEMP}/bootstrap-out"
          wif_args=()
          [[ -n "${VERCEL_WIF_POOL_ID:-}" ]] && wif_args+=(--wif-pool "${VERCEL_WIF_POOL_ID}")
          [[ -n "${VERCEL_WIF_PROVIDER_ID:-}" ]] && wif_args+=(--wif-provider "${VERCEL_WIF_PROVIDER_ID}")
          [[ -n "${VERCEL_WIF_ISSUER:-}" ]] && wif_args+=(--wif-issuer "${VERCEL_WIF_ISSUER}")
          [[ -n "${VERCEL_WIF_ALLOWED_AUDIENCE:-}" ]] && wif_args+=(--wif-audience "${VERCEL_WIF_ALLOWED_AUDIENCE}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_CONDITION:-}" ]] && wif_args+=(--wif-attribute-condition "${VERCEL_WIF_ATTRIBUTE_CONDITION}")
          [[ -n "${VERCEL_WIF_ATTRIBUTE_MAPPING:-}" ]] && wif_args+=(--wif-attribute-mapping "${VERCEL_WIF_ATTRIBUTE_MAPPING}")
          [[ -n "${VERCEL_WIF_PRINCIPAL_SET:-}" ]] && wif_args+=(--wif-principal-set "${VERCEL_WIF_PRINCIPAL_SET}")
          bash scripts/release/bootstrap-production.sh --audit-only \
            --release-sha "${GITHUB_SHA}" \
            --output-directory "${RUNNER_TEMP}/bootstrap-out" \
            --expected-account "${{ vars.GITHUB_BOOTSTRAP_OPERATOR_SA }}" \
            --vercel-token-env VERCEL_TOKEN \
            --upstash-email-env MILO_UPSTASH_EMAIL \
            --upstash-apikey-env MILO_UPSTASH_APIKEY \
            "${wif_args[@]+"${wif_args[@]}"}"

      - name: Upload redacted audit reports (never secret files)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-audit-reports
          path: |
            ${{ runner.temp }}/bootstrap-out/bootstrap-apply.json
            ${{ runner.temp }}/bootstrap-out/readiness.json
            ${{ runner.temp }}/bootstrap-out/readiness.log
          if-no-files-found: warn
